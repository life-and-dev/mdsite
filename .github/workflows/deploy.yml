name: "Deploy MD Site Documentation to GitHub Pages"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NUXT_CONTENT_PATH: "${{ github.workspace }}/docs"
      CONTENT_DIR: "${{ github.workspace }}/docs"
      MDSITE_CONFIG_PATH: "${{ github.workspace }}/mdsite.yml"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ".mdsite/package-lock.json"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .mdsite/node_modules
            .mdsite/.nuxt
            .mdsite/.output
          key: ${{ runner.os }}-nuxt-build-${{ hashFiles('.mdsite/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-build-

      - name: Install dependencies
        working-directory: .mdsite
        run: npm install

      - name: Generate static site
        working-directory: .mdsite
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./.mdsite/.output/public"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
