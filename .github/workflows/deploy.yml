name: "Deploy Docs"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NUXT_CONTENT_PATH: "${{ github.workspace }}/docs"
      CONTENT_DIR: "${{ github.workspace }}/docs"
      MDSITE_CONFIG_PATH: "${{ github.workspace }}/mdsite.yml"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Use checked-in mdsite renderer
        run: test -f mdsite-nuxt/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: "mdsite-nuxt/package-lock.json"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            mdsite-nuxt/node_modules
          key: ${{ runner.os }}-nuxt-build-${{ hashFiles('mdsite-nuxt/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-build-

      - name: Install dependencies
        working-directory: mdsite-nuxt
        run: npm install

      - name: Generate static site
        working-directory: mdsite-nuxt
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: ${{ steps.pages.outputs.base_path }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./mdsite-nuxt/.output/public"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
