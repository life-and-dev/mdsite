name: "Deploy Docs"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NUXT_CONTENT_PATH: "${{ github.workspace }}/docs"
      CONTENT_DIR: "${{ github.workspace }}/docs"
      MDSITE_CONFIG_PATH: "${{ github.workspace }}/mdsite.yml"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup mdsite renderer
        run: |
          npm install --no-save @life-and-dev/mdsite
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')
          const ignored = new Set(['node_modules', '.nuxt', '.output', 'dist', '.cache'])
          const source = path.join(process.cwd(), 'node_modules', '@life-and-dev', 'mdsite', 'mdsite-nuxt')
          const target = path.join(process.cwd(), ".mdsite")
          fs.cpSync(source, target, { recursive: true, force: true, filter: (sourcePath) => !ignored.has(path.basename(sourcePath)) })
          NODE

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ".mdsite/package-lock.json"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            .mdsite/node_modules
          key: ${{ runner.os }}-nuxt-build-${{ hashFiles('.mdsite/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-build-

      - name: Install dependencies
        working-directory: .mdsite
        run: npm install

      - name: Generate static site
        working-directory: .mdsite
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: ${{ steps.pages.outputs.base_path }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./.mdsite/.output/public"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
